<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校数学可視化：ベクトルの内積と動的なす角</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-top: 0; margin-bottom: 20px; }
        .container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        canvas {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fbfbfb;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        .info-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: #f8fafc;
            border-left: 5px solid #ccc;
            padding: 12px;
            border-radius: 4px;
        }
        .card.vecA { border-left-color: #dc3545; }
        .card.vecB { border-left-color: #007bff; }
        .card.result { border-left-color: #28a745; }
        .math-text { font-family: 'Courier New', Courier, monospace; font-size: 15px; font-weight: bold; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>ベクトルと内積の可視化</h1>
    <p>矢印の先端（a, b）をマウスでドラッグして動かしてみよう！</p>

    <div class="container">
        <canvas id="geoCanvas" width="500" height="500"></canvas>

        <div class="info-panel">
            <div class="card vecA">
                <div>ベクトル <span style="color:#dc3545">■</span> <b>a</b></div>
                <div id="textVecA" class="math-text">a = (0, 0)</div>
            </div>
            <div class="card vecB">
                <div>ベクトル <span style="color:#007bff">■</span> <b>b</b></div>
                <div id="textVecB" class="math-text">b = (0, 0)</div>
            </div>
            <div class="card result">
                <div>内積の計算結果</div>
                <div id="textDot" class="math-text" style="font-size: 18px; margin: 5px 0;">a ・ b = 0</div>
                <div id="textAngle" class="math-text">なす角 θ = 0°</div>
                <div id="statusBadge" class="badge">状態</div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
